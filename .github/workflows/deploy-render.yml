name: Deploy Backend to Render

# Se ejecutará automáticamente cuando hagas push a estas ramas
on:
  push:
    branches:
      - staging
      - main 

jobs:
  # Trabajo 1: Asegurar que el código compila y pasa pruebas
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener el código
        uses: actions/checkout@v4

      - name: Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Asegúrate de que coincida con tu versión

      - name: Instalar dependencias limpias
        run: npm ci

      - name: Verificar compilación de NestJS
        run: npm run build

      # Opcional: Aquí puedes descomentar para correr tus pruebas automatizadas
      # - name: Ejecutar Tests
      #   run: npm run test

  # Trabajo 2: Disparar a Render SOLO si el Trabajo 1 fue exitoso
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al Webhook de Render
        # Usamos curl para hacer una petición POST oculta a la URL secreta
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}